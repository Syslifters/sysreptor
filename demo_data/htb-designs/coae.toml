[[report_sections.fields]]
id = "assessment_overview"
type = "markdown"
label = "Assessment Overview"
origin = "custom"
default = """
{{ report.customer_full }} (“{{ report.customer_short }}” herein) invited {{ report.candidate.name }} to perform a targeted Security Assessment of their systems to identify high-risk security weaknesses, assess their impact, document all findings in a clear, professional, and repeatable manner, and provide remediation recommendations.

The objective of this engagement is to identify, analyse, and document security vulnerabilities, safety risks, and misuse vectors affecting the {{ report.customer_short }}'s AI products, including those that may:

* Cause harm to end users, customers, or the client
* Enable bypass of the intended use cases or operational safeguards
* Allow manipulation of model behavior
* Expose sensitive data or internal system components
* Facilitate unauthorized access, control, or output manipulation

The engagement will focus on both technical and behavioral vulnerabilities within AI systems. However, the following types of activities are considered out of scope for this assessment:

* Physical attacks against the client's properties
* Unverified scanner output
* Any vulnerabilities identified through DDoS or spam attacks
* Vulnerabilities in third-party libraries
* Any theoretical attacks or attacks that require significant user interaction.
"""
required = true

[[report_sections.fields]]
id = "approach"
type = "markdown"
label = "Approach"
origin = "custom"
default = """
{{ report.candidate.name }} performed testing under a “{{ report.pentest_approach.label }}” approach from {{ formatDate(report.pentest_start, 'long') }}, to {{ formatDate(report.pentest_end, 'long') }}. The engagement followed a hybrid methodology combining elements from established security testing frameworks and industry best practices for web applications, APIs, and AI systems

Testing was performed remotely from a non-evasive standpoint, with the goal of uncovering as many misconfigurations and vulnerabilities as possible. Each weakness identified was documented and manually investigated to determine exploitation possibilities and escalation potential.

Identified issues were validated through controlled proof-of-concept exploitation to confirm their feasibility and full impact. Exploits were performed in a manner designed to avoid disruption to production services or access to real customer data.
"""
required = true

[[report_sections.fields]]
id = "scope"
type = "markdown"
label = "Scope"
origin = "custom"
default = """
The scope of this assessment was as follows:

TODO: scope

* `www.phantomkernel.htb`: The main company website. The client placed a file `/secret_data.txt` on the filesystem, which {{ report.candidate.name }} was tasked with retrieving as proof of compromise.
*  `mcp.phantomkernel.htb`: PhantomKernel's MCP server, which has not been released and is thus not yet publicly accessible. However, {{ report.candidate.name }} was able to access it by exploiting vulnerabilities documented in this report.
*  `staging.phantomkernel.htb`: PhantomKernel's staging environment for their AI products. All AI systems hosted in the staging environment were considered in scope.


